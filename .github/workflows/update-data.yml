name: Update NOI data

on:
  schedule:
    # Mondays 05:30 UTC. Note: scheduled workflows run on the default branch.
    - cron: '30 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch latest NOI average insurable income
        id: noi
        run: node scripts/update-params.mjs

      - name: Commit updated data
        if: steps.noi.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/params.json
          git commit -m "chore(data): NOI average insurable income €${{ steps.noi.outputs.value }} (${{ steps.noi.outputs.period }})"
          git push

      # A push made with GITHUB_TOKEN does not fire on:push workflows
      # (recursion protection), so dispatch the deploy explicitly.
      - name: Trigger Cloudflare deploy
        if: steps.noi.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref "$GITHUB_REF_NAME"
